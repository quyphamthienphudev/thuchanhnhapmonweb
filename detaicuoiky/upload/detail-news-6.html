  <body>
    <!-- header -->
    <header class="border-bottom py-3">
      <div class="container">
        <div class="d-flex justify-content-between align-items-center">
          <!-- Logo -->
          <div class="logo">
            <h2 class="fw-bold">
              <a href="../trangchu.html">The Sporting News</a>
            </h2>
          </div>

          <!-- Menu -->
          <nav>
            <ul class="d-flex list-unstyled gap-4 m-0">
              <li>
                <a
                  href="https://www.figma.com/design/lBlfThOknv0fhgdhToAs9V/Website-th%E1%BB%83-thao-b%C3%B3ng-%C4%91%C3%A1?node-id=0-1&t=AkJZ94nFtpWOifdv-1"
                  style="font-weight: bolder; color: red"
                  target="_blank"
                  >LINK FIGMA [XEM TẠI ĐÂY]</a
                >
              </li>
              <li><a href="../nfl.html">NFL</a></li>
              <li><a href="../nba.html">NBA</a></li>
              <li><a href="../mlb.html">MLB</a></li>
              <li><a href="../nhl.html">NHL</a></li>
              <li><a href="../soccer.html">SOCCER</a></li>
              <li><a href="../boxing.html">BOXING</a></li>
            </ul>
          </nav>
        </div>
      </div>
    </header>
    <!-- Thanh ti so tran dau -->
    <section class="score-board py-3 bg-white">
      <div class="container">
        <div class="row g-3">
          <div class="col">
            <div class="score-card">
              <p>LAC vs KC</p>
              <p style="color: red; font-size: 20px; font-weight: bolder">
                3 - 2
              </p>
            </div>
          </div>

          <div class="col">
            <div class="score-card">
              <p>TB vs NO</p>
              <p style="color: red; font-size: 20px; font-weight: bolder">
                1 - 1
              </p>
            </div>
          </div>

          <div class="col">
            <div class="score-card">
              <p>WAS vs DET</p>
              <p style="color: red; font-size: 20px; font-weight: bolder">
                0 - 1
              </p>
            </div>
          </div>

          <div class="col">
            <div class="score-card">
              <p>MIA vs KC</p>
              <p style="color: red; font-size: 20px; font-weight: bolder">
                1 - 3
              </p>
            </div>
          </div>
        </div>
      </div>
    </section>
    
    <!-- Thiet ke them o day -->

    <!-- footer -->
    <footer class="footer text-white py-5">
      <div class="container text-center">
        <h3 class="mb-4">Subscribe to get our latest news!</h3>

        <form id="form">
          <div class="subscribe-box d-flex justify-content-center mb-5">
            <input
              type="email"
              id="email"
              class="form-control w-50"
              placeholder="Enter email"
              required
            />

            <button type="submit" class="btn btn-primary" id="subscribe">
              SUBSCRIBE
            </button>
          </div>
        </form>

        <h2 class="fw-bold">The Sporting News</h2>

        <p class="mt-3">Copyright © 2026 Sporting News</p>
      </div>
    </footer>
    <!-- bs5 -->
    <script src="../css/bs5/js/bootstrap.bundle.min.js"></script>
    <!-- emailjs -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <!-- js -->
    <script src="../js/script.js"></script>
  </body>
</html>
